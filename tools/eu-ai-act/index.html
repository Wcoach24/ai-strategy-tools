                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Checklist Tab */}
                        {activeTab === 'checklist' && (
                            <div className="space-y-6">
                                <div className="glass rounded-2xl p-6 border border-white/10">
                                    <div className="flex flex-wrap justify-between items-center gap-4">
                                        <div>
                                            <h2 className="text-2xl font-bold text-white">
                                                Checklist de Compliance
                                            </h2>
                                            <p className="text-slate-400 text-sm mt-1">
                                                {stats.criticalChecked}/{stats.critical} requisitos críticos completados
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-4xl font-bold text-amber-400">
                                                {stats.percentage}%
                                            </div>
                                            <div className="text-sm text-slate-400">
                                                {stats.checked}/{stats.total} total
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-4 h-3 bg-slate-800 rounded-full overflow-hidden">
                                        <div
                                            className="h-full bg-gradient-to-r from-amber-500 to-green-500 transition-all duration-500"
                                            style={{ width: `${stats.percentage}%` }}
                                        />
                                    </div>
                                </div>

                                {complianceChecklist.map((category, catIdx) => (
                                    <div key={catIdx} className="glass rounded-2xl border border-white/10 overflow-hidden">
                                        <div className="p-4 bg-white/5 border-b border-white/10">
                                            <h3 className="text-lg font-bold text-white flex items-center gap-3">
                                                <span>{category.icon}</span>
                                                {category.category}
                                            </h3>
                                        </div>
                                        <div className="p-4 space-y-2">
                                            {category.items.map((item, itemIdx) => {
                                                const key = `${category.category}-${itemIdx}`;
                                                return (
                                                    <button
                                                        key={itemIdx}
                                                        onClick={() => toggleCheck(category.category, itemIdx)}
                                                        className={`w-full flex items-center gap-4 p-4 rounded-xl transition-all ${
                                                            checkedItems[key]
                                                                ? 'bg-green-500/10 border border-green-500/30'
                                                                : 'bg-slate-800/30 border border-slate-700 hover:border-slate-600'
                                                        }`}
                                                    >
                                                        <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center shrink-0 ${
                                                            checkedItems[key]
                                                                ? 'bg-green-500 border-green-500'
                                                                : 'border-slate-600'
                                                        }`}>
                                                            {checkedItems[key] && <span className="text-white text-sm">✓</span>}
                                                        </div>
                                                        <span className={`flex-1 text-left ${
                                                            checkedItems[key] ? 'text-green-300 line-through' : 'text-white'
                                                        }`}>
                                                            {item.text}
                                                        </span>
                                                        <span className="text-xs text-slate-500 shrink-0">{item.article}</span>
                                                        {item.critical && (
                                                            <span className="px-2 py-1 bg-red-500/20 text-red-300 text-xs rounded-full shrink-0">
                                                                CRÍTICO
                                                            </span>
                                                        )}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Spain Tab */}
                        {activeTab === 'spain' && (
                            <div className="space-y-6">
                                <div className="glass rounded-3xl p-8 border border-white/10">
                                    <div className="flex items-center gap-6 mb-8">
                                        <span className="text-6xl">🇪🇸</span>
                                        <div>
                                            <h2 className="text-3xl font-bold text-white">España: Líder en Implementación</h2>
                                            <p className="text-amber-400 font-medium">{spainSpecific.note}</p>
                                        </div>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-6 mb-8">
                                        <div className="bg-white/5 rounded-2xl p-6">
                                            <h3 className="text-lg font-semibold text-amber-400 mb-4 flex items-center gap-2">
                                                <span>🏛️</span> AESIA
                                            </h3>
                                            <ul className="space-y-3 text-slate-300">
                                                <li><strong className="text-white">Nombre:</strong> {spainSpecific.regulator}</li>
                                                <li><strong className="text-white">Establecida:</strong> {spainSpecific.established}</li>
                                                <li><strong className="text-white">Ubicación:</strong> {spainSpecific.location}</li>
                                                <li>
                                                    <strong className="text-white">Web:</strong>{' '}
                                                    <a href={spainSpecific.website} target="_blank" className="text-blue-400 hover:underline">
                                                        aesia.digital.gob.es
                                                    </a>
                                                </li>
                                            </ul>
                                        </div>

                                        <div className="bg-white/5 rounded-2xl p-6">
                                            <h3 className="text-lg font-semibold text-amber-400 mb-4 flex items-center gap-2">
                                                <span>🧪</span> Sandbox Regulatorio
                                            </h3>
                                            <ul className="space-y-3 text-slate-300">
                                                <li><strong className="text-white">Decreto:</strong> {spainSpecific.sandbox.decree}</li>
                                                <li><strong className="text-white">Proyectos:</strong> {spainSpecific.sandbox.projects}</li>
                                                <li><strong className="text-white">Fecha:</strong> {spainSpecific.sandbox.date}</li>
                                            </ul>
                                        </div>
                                    </div>

                                    <div className="bg-red-500/10 rounded-2xl p-6 border border-red-500/30">
                                        <h3 className="text-lg font-semibold text-red-400 mb-4 flex items-center gap-2">
                                            <span>⚠️</span> Régimen Sancionador
                                        </h3>
                                        <div className="grid md:grid-cols-3 gap-4">
                                            {spainSpecific.penalties.map((p, i) => (
                                                <div key={i} className="bg-slate-900/50 rounded-xl p-4">
                                                    <div className="text-sm text-slate-400 mb-1">{p.type}</div>
                                                    <div className="text-lg font-bold text-white">{p.amount}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="glass rounded-2xl p-8 border border-white/10">
                                    <h3 className="text-xl font-bold text-white mb-6">Ventajas Competitivas de España</h3>
                                    <div className="grid md:grid-cols-4 gap-4">
                                        {[
                                            { icon: '🥇', text: 'Primera agencia supervisora en Europa' },
                                            { icon: '🧪', text: 'Sandbox regulatorio operativo' },
                                            { icon: '📋', text: 'Guías prácticas publicadas' },
                                            { icon: '🤝', text: 'Colaboración activa con industria' }
                                        ].map((item, i) => (
                                            <div key={i} className="bg-green-500/10 rounded-xl p-4 text-center border border-green-500/20">
                                                <span className="text-3xl mb-2 block">{item.icon}</span>
                                                <p className="text-white text-sm font-medium">{item.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Resources Tab */}
                        {activeTab === 'resources' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-white text-center mb-8">
                                    📚 Recursos Oficiales y Herramientas
                                </h2>
                                {resources.map((section, idx) => (
                                    <div key={idx} className="glass rounded-2xl p-6 border border-white/10">
                                        <h3 className="text-lg font-semibold text-amber-400 mb-4">{section.category}</h3>
                                        <div className="space-y-3">
                                            {section.items.map((item, i) => (
                                                <a
                                                    key={i}
                                                    href={item.url}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="flex items-center justify-between p-4 rounded-xl bg-slate-800/30 hover:bg-slate-700/30 border border-slate-700 hover:border-blue-500/50 transition-all group"
                                                >
                                                    <span className="text-white group-hover:text-blue-300 transition-colors">
                                                        {item.name}
                                                    </span>
                                                    <span className="px-3 py-1 bg-white/10 rounded-full text-xs text-slate-400">
                                                        {item.type} ↗
                                                    </span>
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Footer */}
                        <footer className="mt-16 pt-8 border-t border-slate-800">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-center md:text-left">
                                    <div className="text-slate-400 text-sm">
                                        Framework basado en el Reglamento (UE) 2024/1689 y guías de AESIA
                                    </div>
                                    <div className="text-slate-500 text-xs mt-1">
                                        Última actualización: Febrero 2026
                                    </div>
                                </div>
                                <div className="flex flex-col items-center md:items-end gap-3">
                                    <div className="text-white font-semibold text-lg">{AUTHOR_NAME}</div>
                                    <div className="flex items-center gap-3 text-sm text-slate-400">
                                        <span>{AUTHOR_TITLE}</span>
                                    </div>
                                    <a
                                        href={LINKEDIN_URL}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="linkedin-gradient text-white px-5 py-2 rounded-lg flex items-center gap-2 hover:opacity-90 transition-opacity text-sm font-medium"
                                    >
                                        <LinkedInIcon className="w-4 h-4" />
                                        Conectar en LinkedIn
                                    </a>
                                </div>
                            </div>
                            {/* Legal Disclaimer */}
                            <div className="mt-6 p-4 bg-slate-800/30 rounded-xl border border-slate-700/50">
                                <p className="text-slate-500 text-xs text-center leading-relaxed">
                                    <strong className="text-slate-400">Aviso legal:</strong> Esta herramienta tiene carácter informativo y educativo.
                                    No constituye asesoramiento legal. La clasificación de riesgo final debe ser determinada por profesionales
                                    cualificados considerando las circunstancias específicas de cada caso. Consulta con un abogado especializado
                                    antes de tomar decisiones de compliance.
                                </p>
                            </div>
                            <div className="text-center text-slate-600 text-xs mt-4">
                                © 2026 • Herramienta de compliance para el AI Act europeo
                            </div>
                        </footer>
                    </div>

                    {/* Floating LinkedIn Button */}
                    <FloatingLinkedIn />

                    {/* Conversion Modal */}
                    <ConversionModal
                        isOpen={showModal}
                        onClose={() => setShowModal(false)}
                        resultLevel={classificationResult?.level}
                    />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
