                    'Lo mejor de ambos mundos según el tipo de query',
                    'Modelo fine-tuned entiende tu dominio profundamente',
                    'RAG proporciona datos frescos y citaciones',
                    'Flexibilidad para diferentes sub-casos de uso',
                    'Escalabilidad gradual según madurez'
                ],
                considerations: [
                    'Mayor complejidad de arquitectura y mantenimiento',
                    'Requiere router inteligente para decidir approach',
                    'Más componentes = más puntos de fallo potenciales',
                    'Necesita estrategia clara de cuándo usar qué'
                ],
                nextSteps: [
                    'Categorizar queries por tipo (factual vs generativo)',
                    'Implementar router basado en clasificación de intent',
                    'Fine-tune modelo base con conocimiento de dominio',
                    'Configurar RAG para datos dinámicos y citaciones'
                ],
                tools: ['LangChain', 'LlamaIndex', 'Semantic Router', 'Custom Orchestration', 'Feature Flags'],
                Diagram: HybridDiagram
            }
        };

        function App() {
            // Load saved progress from localStorage
            const savedState = (() => {
                try {
                    const saved = localStorage.getItem('rag-ft-progress');
                    return saved ? JSON.parse(saved) : null;
                } catch { return null; }
            })();

            const [currentStep, setCurrentStep] = useState(savedState?.currentStep || 0);
            const [answers, setAnswers] = useState(savedState?.answers || {});
            const [showResult, setShowResult] = useState(false);
            const [recommendation, setRecommendation] = useState(null);
            const [scores, setScores] = useState({ rag: 0, ft: 0, hybrid: 0 });
            const [copied, setCopied] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [modalShown, setModalShown] = useState(false);

            // Persist progress to localStorage
            useEffect(() => {
                if (Object.keys(answers).length > 0 && !showResult) {
                    try {
                        localStorage.setItem('rag-ft-progress', JSON.stringify({ currentStep, answers }));
                    } catch {}
                }
            }, [currentStep, answers, showResult]);

            const handleAnswer = (questionId, value, weight) => {
                const newAnswers = { ...answers, [questionId]: { value, weight } };
                setAnswers(newAnswers);

                if (currentStep < questions.length - 1) {
                    setTimeout(() => setCurrentStep(currentStep + 1), 300);
                } else {
                    calculateResult(newAnswers);
                }
            };

            const calculateResult = (finalAnswers) => {
                const newScores = { rag: 0, ft: 0, hybrid: 0 };
                Object.values(finalAnswers).forEach(({ value, weight }) => {
                    newScores[value] += weight;
                });
                setScores(newScores);

                let result;
                const total = newScores.rag + newScores.ft + newScores.hybrid;
                const ragPct = newScores.rag / total;
                const ftPct = newScores.ft / total;
                const hybridPct = newScores.hybrid / total;

                if (hybridPct > 0.35 || (ragPct > 0.3 && ftPct > 0.3)) {
                    result = 'hybrid';
                } else if (ragPct > ftPct) {
                    result = 'rag';
                } else {
                    result = 'ft';
                }

                setRecommendation(recommendations[result]);
                setTimeout(() => {
                    setShowResult(true);
                    // Show modal after 3 seconds of viewing results
                    if (!modalShown) {
                        setTimeout(() => {
                            setShowModal(true);
                            setModalShown(true);
                        }, 3000);
                    }
                }, 300);
            };

            const reset = () => {
                setCurrentStep(0);
                setAnswers({});
                setShowResult(false);
                setRecommendation(null);
                setScores({ rag: 0, ft: 0, hybrid: 0 });
                try { localStorage.removeItem('rag-ft-progress'); } catch {}
            };

            const copyResult = () => {
                const text = `Mi análisis RAG vs Fine-tuning:\n\nRecomendación: ${recommendation.title}\n\nScores:\n- RAG: ${scores.rag}\n- Fine-tuning: ${scores.ft}\n- Híbrido: ${scores.hybrid}\n\nHerramienta por ${AUTHOR_NAME}: ${window.location.href}`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const progress = ((currentStep + 1) / questions.length) * 100;
            const currentQ = questions[currentStep];

            return (
                <div className="min-h-screen py-8 px-4">
                    <FloatingLinkedIn />
                    <ConversionModal
                        isOpen={showModal}
                        onClose={() => setShowModal(false)}
                        recommendation={recommendation}
                    />

                    <div className="max-w-5xl mx-auto">
                        {/* Header */}
                        <header className="text-center mb-8">
                            <div className="inline-flex items-center gap-2 px-4 py-2 bg-blue-500/20 rounded-full text-blue-300 text-sm mb-6">
                                <span className="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></span>
                                Enterprise GenAI Decision Framework
                            </div>
                            <h1 className="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                                RAG vs Fine-tuning
                            </h1>
                            <p className="text-xl text-slate-400 max-w-2xl mx-auto mb-8">
                                Determina la arquitectura óptima para tu caso de uso de IA generativa
                            </p>
                        </header>

                        {/* Introduction Section */}
                        <div className="glass rounded-2xl p-6 md:p-8 border border-slate-700/50 mb-10">
                            <div className="max-w-3xl mx-auto">
                                <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                    Una de las decisiones más críticas en proyectos de <strong className="text-white">IA Generativa enterprise</strong> es elegir entre RAG (Retrieval-Augmented Generation), Fine-tuning, o un enfoque híbrido. Cada arquitectura tiene implicaciones significativas en coste, time-to-market, mantenimiento y calidad de resultados.
                                </p>

                                <div className="grid md:grid-cols-3 gap-4 mb-6">
                                    <div className="bg-slate-800/50 rounded-xl p-4 text-center">
                                        <div className="text-3xl mb-2">🎯</div>
                                        <div className="text-white font-semibold mb-1">8 Preguntas</div>
                                        <div className="text-slate-400 text-sm">Cuestionario estratégico basado en casos reales</div>
                                    </div>
                                    <div className="bg-slate-800/50 rounded-xl p-4 text-center">
                                        <div className="text-3xl mb-2">📊</div>
                                        <div className="text-white font-semibold mb-1">Scoring Ponderado</div>
                                        <div className="text-slate-400 text-sm">Algoritmo que evalúa RAG, Fine-tuning e Híbrido</div>
                                    </div>
                                    <div className="bg-slate-800/50 rounded-xl p-4 text-center">
                                        <div className="text-3xl mb-2">🚀</div>
                                        <div className="text-white font-semibold mb-1">Recomendación + Roadmap</div>
                                        <div className="text-slate-400 text-sm">Con justificación técnica y próximos pasos</div>
                                    </div>
                                </div>

                                <div className="text-center">
                                    <span className="text-slate-500 text-sm">
                                        Ideal para CTOs, Architects, Product Managers y equipos de Data/ML evaluando opciones GenAI
                                    </span>
                                </div>
                            </div>
                        </div>

                        {!showResult ? (
                            <>
                                {/* Progress */}
                                <div className="mb-8">
                                    <div className="flex justify-between text-sm text-slate-400 mb-2">
                                        <span className="flex items-center gap-2">
                                            <span className="text-xl">{currentQ.icon}</span>
                                            Pregunta {currentStep + 1} de {questions.length}
                                        </span>
                                        <span>{Math.round(progress)}%</span>
                                    </div>
                                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                                        <div
                                            className="h-full bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 transition-all duration-500"
                                            style={{ width: `${progress}%` }}
                                        />
                                    </div>
                                </div>

                                {/* Question Card */}
                                <div className="glass rounded-3xl p-8 mb-8 border border-slate-700/50">
                                    <h2 className="text-2xl md:text-3xl font-semibold text-white mb-8">
                                        {currentQ.question}
                                    </h2>
                                    <div className="space-y-4">
                                        {currentQ.options.map((option, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => handleAnswer(currentQ.id, option.value, option.weight)}
                                                className="w-full text-left p-6 rounded-2xl bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700 hover:border-slate-500 transition-all duration-300 group"
                                            >
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <div className="font-semibold text-white group-hover:text-blue-300 transition-colors text-lg">
                                                            {option.label}
                                                        </div>
                                                        <div className="text-sm text-slate-400 mt-1">
                                                            {option.desc}
                                                        </div>
                                                    </div>
                                                    <div className="text-slate-600 group-hover:text-blue-400 transition-colors">
                                                        →
                                                    </div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Navigation */}
                                <div className="flex justify-between items-center">
                                    {currentStep > 0 ? (
                                        <button
                                            onClick={() => setCurrentStep(currentStep - 1)}
                                            className="text-slate-400 hover:text-white transition-colors flex items-center gap-2"
                                        >
                                            ← Anterior
                                        </button>
                                    ) : <div />}
                                    <div className="flex gap-1">
                                        {questions.map((_, idx) => (
                                            <div
                                                key={idx}
                                                className={`w-3 h-3 rounded-full transition-all ${
                                                    idx < currentStep ? 'bg-green-500' :
                                                    idx === currentStep ? 'bg-blue-500 scale-125' :
                                                    'bg-slate-700'
                                                }`}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </>
                        ) : (
                            /* Results */
                            <div className="space-y-8">
                                {/* Author Card - Top of results */}
                                <AuthorCard />

                                {/* Score Summary */}
                                <div className="glass rounded-2xl p-6 border border-slate-700/50">
                                    <h3 className="text-sm font-semibold text-slate-400 mb-4">ANÁLISIS DE RESPUESTAS</h3>
                                    <div className="grid grid-cols-3 gap-4">
                                        {[
                                            { key: 'rag', label: 'RAG', color: 'bg-blue-500' },
                                            { key: 'ft', label: 'Fine-tuning', color: 'bg-purple-500' },
                                            { key: 'hybrid', label: 'Híbrido', color: 'bg-amber-500' }
                                        ].map(({ key, label, color }) => (
                                            <div key={key} className="text-center">
                                                <div className="text-2xl font-bold text-white">{scores[key]}</div>
                                                <div className="text-xs text-slate-400 mb-2">{label}</div>
                                                <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                                                    <div
                                                        className={`h-full ${color} transition-all duration-1000`}
                                                        style={{ width: `${(scores[key] / (scores.rag + scores.ft + scores.hybrid)) * 100}%` }}
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Main Recommendation */}
                                <div className={`bg-gradient-to-r ${recommendation.color} p-[2px] rounded-3xl ${recommendation.glowClass}`}>
                                    <div className="bg-slate-900 rounded-3xl p-8">
                                        <div className="flex items-start gap-6 mb-8">
                                            <span className="text-6xl animate-float">{recommendation.icon}</span>
                                            <div>
                                                <h2 className="text-3xl md:text-4xl font-bold text-white mb-2">
                                                    {recommendation.title}
                                                </h2>
                                                <p className="text-xl text-slate-300">
                                                    {recommendation.summary}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Architecture Diagram */}
                                        <div className="bg-slate-800/50 rounded-2xl p-6 mb-8">
                                            <h3 className="text-sm font-semibold text-slate-400 mb-4">ARQUITECTURA RECOMENDADA</h3>
                                            <recommendation.Diagram />
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-6 mb-8">
                                            <div className="bg-green-500/10 rounded-2xl p-6 border border-green-500/20">
                                                <h3 className="text-lg font-semibold text-green-400 mb-4 flex items-center gap-2">
                                                    <span>✓</span> Beneficios
                                                </h3>
                                                <ul className="space-y-3">
                                                    {recommendation.benefits.map((b, i) => (
                                                        <li key={i} className="text-slate-300 flex items-start gap-3">
                                                            <span className="text-green-400 mt-1">•</span>
                                                            {b}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="bg-amber-500/10 rounded-2xl p-6 border border-amber-500/20">
                                                <h3 className="text-lg font-semibold text-amber-400 mb-4 flex items-center gap-2">
                                                    <span>⚠</span> Consideraciones
                                                </h3>
                                                <ul className="space-y-3">
                                                    {recommendation.considerations.map((c, i) => (
                                                        <li key={i} className="text-slate-300 flex items-start gap-3">
                                                            <span className="text-amber-400 mt-1">•</span>
                                                            {c}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        {/* Next Steps */}
                                        <div className="bg-blue-500/10 rounded-2xl p-6 border border-blue-500/20 mb-8">
                                            <h3 className="text-lg font-semibold text-blue-400 mb-4 flex items-center gap-2">
                                                <span>🚀</span> Próximos Pasos
                                            </h3>
                                            <ol className="space-y-3">
                                                {recommendation.nextSteps.map((step, i) => (
                                                    <li key={i} className="text-slate-300 flex items-start gap-3">
                                                        <span className="w-6 h-6 rounded-full bg-blue-500/30 text-blue-300 flex items-center justify-center text-sm shrink-0">
                                                            {i + 1}
                                                        </span>
                                                        {step}
                                                    </li>
                                                ))}
                                            </ol>
                                        </div>

                                        {/* Tools */}
                                        <div>
                                            <h3 className="text-sm font-semibold text-slate-400 mb-3">HERRAMIENTAS RECOMENDADAS</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {recommendation.tools.map((tool, i) => (
                                                    <span key={i} className="px-4 py-2 bg-slate-800 rounded-full text-sm text-white border border-slate-700">
                                                        {tool}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Use Cases */}
                                <div className="glass rounded-2xl p-8 border border-slate-700/50">
                                    <h3 className="text-xl font-semibold text-white mb-6">Casos de Uso Reales</h3>
                                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        {useCases[Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b)].map((uc, i) => (
                                            <div key={i} className="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                                                <div className="text-xs text-slate-500 uppercase tracking-wide mb-1">{uc.industry}</div>
                                                <div className="text-white font-medium mb-2">{uc.case}</div>
                                                <div className="text-sm text-slate-400 italic">{uc.example}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* CTA Section */}
                                <div className="linkedin-gradient rounded-2xl p-8 text-center">
                                    <h3 className="text-2xl font-bold text-white mb-3">
                                        ¿Necesitas ayuda implementando esta arquitectura?
                                    </h3>
                                    <p className="text-white/80 mb-6 max-w-xl mx-auto">
                                        Conéctate conmigo para discutir tu caso de uso específico y cómo abordar la implementación de forma estratégica.
                                    </p>
                                    <a
                                        href={LINKEDIN_URL}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="inline-flex items-center gap-3 px-8 py-4 bg-white text-[#0077B5] font-bold rounded-xl hover:bg-slate-100 transition-all"
                                    >
                                        <LinkedInIcon className="w-6 h-6" />
                                        Conectar con {AUTHOR_NAME}
                                    </a>
                                </div>

                                {/* Comparison Table */}
                                <div className="glass rounded-2xl p-8 border border-slate-700/50 overflow-x-auto">
                                    <h3 className="text-xl font-semibold text-white mb-6">Comparativa Completa</h3>
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="border-b border-slate-700">
                                                <th className="text-left py-4 px-4 text-slate-400 font-medium">Criterio</th>
                                                <th className="text-center py-4 px-4 text-blue-400 font-medium">RAG</th>
                                                <th className="text-center py-4 px-4 text-purple-400 font-medium">Fine-tuning</th>
                                                <th className="text-center py-4 px-4 text-amber-400 font-medium">Híbrido</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-slate-300">
                                            {[
                                                ['Datos actualizados', '✅ Excelente', '❌ Estático', '✅ Con RAG'],
                                                ['Citación de fuentes', '✅ Nativo', '❌ No disponible', '✅ Parcial'],
                                                ['Latencia', '⚠️ +200-500ms', '✅ Mínima', '⚠️ Variable'],
                                                ['Coste inicial', '✅ Bajo', '⚠️ Alto', '⚠️ Medio-Alto'],
                                                ['Coste por query', '⚠️ Medio', '✅ Bajo a escala', '⚠️ Medio'],
                                                ['Consistencia output', '⚠️ Variable', '✅ Alta', '✅ Alta'],
                                                ['Expertise requerido', '✅ Data Eng', '⚠️ ML/DL', '⚠️ Ambos'],
                                                ['Time to market', '✅ Rápido', '⚠️ Lento', '⚠️ Medio'],
                                            ].map(([criterion, rag, ft, hybrid], i) => (
                                                <tr key={i} className="border-b border-slate-800">
                                                    <td className="py-4 px-4 text-white">{criterion}</td>
                                                    <td className="text-center py-4 px-4">{rag}</td>
                                                    <td className="text-center py-4 px-4">{ft}</td>
                                                    <td className="text-center py-4 px-4">{hybrid}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Actions */}
                                <div className="flex flex-wrap justify-center gap-4">
                                    <button
                                        onClick={reset}
                                        className="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-full transition-all border border-slate-700"
                                    >
                                        Evaluar otro caso →
                                    </button>
                                    <button
                                        onClick={copyResult}
                                        className="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all"
                                    >
                                        {copied ? '✓ Copiado!' : 'Compartir resultado'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Footer */}
                        <footer className="mt-16 pt-8 border-t border-slate-800">
                            <div className="glass rounded-2xl p-8 border border-slate-700/50 mb-8">
                                <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-16 h-16 rounded-full linkedin-gradient flex items-center justify-center text-2xl font-bold text-white">
                                            AZ
                                        </div>
                                        <div>
                                            <div className="text-xl font-bold text-white">{AUTHOR_NAME}</div>
                                            <div className="text-blue-400">{AUTHOR_TITLE}</div>
                                        </div>
                                    </div>
                                    <a
                                        href={LINKEDIN_URL}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="px-6 py-3 linkedin-gradient hover:opacity-90 text-white font-semibold rounded-xl transition-all flex items-center gap-2"
                                    >
                                        <LinkedInIcon className="w-5 h-5" />
                                        Conectar en LinkedIn
                                    </a>
                                </div>
                            </div>

                            <div className="text-center text-slate-500 text-sm">
                                <p>Framework basado en mejores prácticas de IBM, Google, y experiencia en proyectos enterprise</p>
                                <p className="mt-2">© 2026 {AUTHOR_NAME} • Herramienta de decisión para arquitecturas GenAI</p>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
